<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>CLASSIFIED — TUA銀行</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Noto+Sans+JP:wght@300;400;700&family=Noto+Serif+JP:wght@400;700&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #12121a;
      --bg-light: #1a1a26;
      --gold: #c9a84c;
      --gold-light: #dfc06a;
      --gold-dim: rgba(201,168,76,0.15);
      --coral: #d25a32;
      --teal: #32b48c;
      --text: #eae7e0;
      --text-secondary: #a09b92;
      --text-muted: #6b6760;
      --border: rgba(201,168,76,0.15);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Noto Sans JP', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Scanline overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.08) 2px,
        rgba(0,0,0,0.08) 4px
      );
      pointer-events: none;
      z-index: 100;
    }

    /* Vignette */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.6) 100%);
      pointer-events: none;
      z-index: 99;
    }

    .container {
      max-width: 600px;
      margin: 0 auto;
      padding: 60px 24px;
      position: relative;
      z-index: 10;
    }

    /* Header badge */
    .badge {
      display: inline-block;
      border: 1px solid var(--coral);
      color: var(--coral);
      font-family: 'Orbitron', monospace;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 3px;
      padding: 6px 16px;
      text-transform: uppercase;
      margin-bottom: 32px;
      animation: blink 2s ease-in-out infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .header {
      text-align: center;
      margin-bottom: 48px;
    }

    .header h1 {
      font-family: 'Cormorant Garamond', 'Noto Serif JP', serif;
      font-size: 14px;
      font-weight: 400;
      color: var(--text-muted);
      letter-spacing: 4px;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    .header .title {
      font-family: 'Cormorant Garamond', 'Noto Serif JP', serif;
      font-size: 28px;
      font-weight: 700;
      color: var(--gold);
      letter-spacing: 2px;
      line-height: 1.4;
    }

    .divider {
      width: 60px;
      height: 1px;
      background: var(--gold);
      margin: 32px auto;
      opacity: 0.5;
    }

    /* Decryption animation */
    .decrypt-section {
      opacity: 0;
      transform: translateY(20px);
      animation: fadeUp 1s ease forwards;
      animation-delay: 0.5s;
    }

    .decrypt-section:nth-child(2) { animation-delay: 0.8s; }
    .decrypt-section:nth-child(3) { animation-delay: 1.1s; }

    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }

    /* Status line */
    .status {
      font-family: 'Orbitron', monospace;
      font-size: 10px;
      color: var(--teal);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .status::before {
      content: '▶ ';
    }

    /* Main message card */
    .message-card {
      background: linear-gradient(135deg, rgba(201,168,76,0.06) 0%, rgba(201,168,76,0.02) 100%);
      border: 1px solid var(--gold-dim);
      border-left: 3px solid var(--gold);
      padding: 32px 28px;
      margin: 24px 0;
      position: relative;
    }

    .message-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, var(--gold), transparent);
      opacity: 0.3;
    }

    .message-label {
      font-family: 'Orbitron', monospace;
      font-size: 9px;
      color: var(--gold);
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 20px;
      opacity: 0.7;
    }

    .message-text {
      font-family: 'Noto Serif JP', serif;
      font-size: 22px;
      font-weight: 700;
      color: var(--gold-light);
      line-height: 1.8;
      letter-spacing: 3px;
      text-align: center;
    }

    .message-text .line2 {
      display: block;
      margin-top: 12px;
      font-size: 18px;
      letter-spacing: 2px;
    }

    /* Typewriter effect for message */
    .typewriter {
      overflow: hidden;
      white-space: nowrap;
      border-right: 2px solid var(--gold);
      animation: typing 2s steps(9) forwards, cursor 0.6s step-end infinite;
      animation-delay: 1.8s;
      width: 0;
      display: inline-block;
    }

    .typewriter.line2 {
      animation-delay: 3.5s;
      animation: typing2 2.5s steps(14) forwards, cursor 0.6s step-end infinite;
      width: 0;
    }

    @keyframes typing {
      from { width: 0; }
      to { width: 100%; }
    }

    @keyframes typing2 {
      from { width: 0; }
      to { width: 100%; }
    }

    @keyframes cursor {
      50% { border-color: transparent; }
    }

    /* Bottom section */
    .footer-note {
      text-align: center;
      margin-top: 48px;
      opacity: 0;
      animation: fadeUp 1s ease forwards;
      animation-delay: 2s;
    }

    .footer-note p {
      font-size: 12px;
      color: var(--text-muted);
      line-height: 1.8;
      letter-spacing: 1px;
    }

    .footer-note .warning {
      color: var(--coral);
      font-family: 'Orbitron', monospace;
      font-size: 9px;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-top: 24px;
    }

    /* Glitch effect on load */
    .glitch-overlay {
      position: fixed;
      inset: 0;
      background: var(--bg);
      z-index: 200;
      animation: glitchFade 1.5s ease forwards;
    }

    .glitch-overlay::before {
      content: 'DECRYPTING...';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-family: 'Orbitron', monospace;
      font-size: 12px;
      color: var(--teal);
      letter-spacing: 6px;
      animation: glitchText 1.5s ease forwards;
    }

    @keyframes glitchFade {
      0%, 60% { opacity: 1; }
      70% { opacity: 1; }
      100% { opacity: 0; pointer-events: none; }
    }

    @keyframes glitchText {
      0% { opacity: 0; }
      10% { opacity: 1; }
      60% { opacity: 1; }
      80% { opacity: 0; }
      100% { opacity: 0; }
    }

    /* Responsive */
    @media (max-width: 480px) {
      .container { padding: 40px 16px; }
      .message-text { font-size: 20px; letter-spacing: 2px; }
      .message-text .line2 { font-size: 16px; }
      .header .title { font-size: 24px; }
    }
  </style>
</head>
<body>
  <div class="glitch-overlay"></div>

  <div class="container">
    <div class="header">
      <div class="badge">CLASSIFIED</div>
      <h1>TUA Bank Internal Investigation</h1>
      <div class="title">極秘文書の解読に成功しました</div>
    </div>

    <div class="divider"></div>

    <div class="decrypt-section">
      <div class="status">decryption complete</div>
    </div>

    <div class="decrypt-section">
      <div class="message-card">
        <div class="message-label">Recovered Message</div>
        <div class="message-text">
          <span>頭取の三角ポップの裏を見て</span>
          <span class="line2">頭取の野望を解き明かせ</span>
        </div>
      </div>
    </div>

    <div class="decrypt-section">
      <div class="footer-note">
        <p>長田頭取の野望はまだ明らかになっていない。<br>上記の指示に従い、真実を暴け。</p>
        <div class="warning">— TUA Bank Internal Audit Division —</div>
      </div>
    </div>
  </div>
</body>
</html>
